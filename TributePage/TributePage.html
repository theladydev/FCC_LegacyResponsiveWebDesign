    <h1 id="title">Tribute to the African Buffalo</h1>

    <figure id="img-div">

        id="image"
        src="https://pixabay.com/get/g7168afcb6c857c2258920355ac4e94aa229a5dff1df7db339258fd66af910eb1c848e21b47096d5cb65e270473f8b9da5270a8d5e8fdd785a451e024975cd35b0d95c8b913f594a026232f3e3bf15a45_1280.jpg?attachment="

    <div id="tribute-info">
      <p>
        The African buffalo is a powerful and resilient species native to the grasslands and forests of Africa. Known for its strength and herd behavior, it plays a vital role in maintaining the ecological balance of its habitat.

    <a
      id="tribute-link"
