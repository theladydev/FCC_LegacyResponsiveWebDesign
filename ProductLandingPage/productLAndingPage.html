<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Landing Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="header">
    <img
      id="header-img"
      src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png"
      alt="Product Logo"
    />

    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#how-it-works">How It Works</a>
      <a class="nav-link" href="#pricing">Pricing</a>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Our Product</h1>
      <form id="form" action="https://www.freecodecamp.com/email-submit">
        <input
          id="email"
          name="email"
          type="email"
          placeholder="Enter your email"
          required
        />
        <input id="submit" type="submit" value="Submit" />
      </form>
    </section>

    <section id="features">
      <h2>Features</h2>
      <div class="feature">Premium build quality</div>
      <div class="feature">Fast and free delivery</div>
      <div class="feature">Reliable customer service</div>
    </section>

    <section id="how-it-works">
      <h2>How It Works</h2>
      <iframe
        id="video"
        width="550"
        height="310"
        src="https://www.youtube.com/embed/y8Yv4pnO7qc"
        frameborder="0"
        allowfullscreen
        style="border: none;"
      ></iframe>
    </section>

    <section id="pricing">
      <h2>Pricing</h2>
      <div class="product">
        <h3>Basic</h3>
        <p>$100</p>
        <button>Select</button>
      </div>
      <div class="product">
        <h3>Pro</h3>
        <p>$200</p>
        <button>Select</button>
      </div>
      <div class="product">
        <h3>Elite</h3>
        <p>$300</p>
        <button>Select</button>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Product Co.</p>
  </footer>
</body>
</html>
